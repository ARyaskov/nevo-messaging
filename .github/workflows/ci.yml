name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  lint-build-test:
    name: Lint, build and test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["24"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Type-check
        run: pnpm build

      - name: Tests
        run: pnpm test
        env:
          NODE_OPTIONS: --experimental-vm-modules

  devtools-build:
    name: DevTools UI build
    runs-on: ubuntu-latest
    if: ${{ hashFiles('devtools/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: devtools/pnpm-lock.yaml

      - name: Install
        working-directory: devtools
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: devtools
        run: pnpm run build --if-present
